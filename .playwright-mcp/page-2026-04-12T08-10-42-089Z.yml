                - generic [ref=e1078]:
                  - heading "Key Features of Open WebUI ⭐" [level=2] [ref=e1079]
                  - 'link "Permalink: Key Features of Open WebUI ⭐" [ref=e1080] [cursor=pointer]':
                    - /url: "#key-features-of-open-webui-"
                    - img [ref=e1081]
                - list [ref=e1083]:
                  - listitem [ref=e1084]:
                    - paragraph [ref=e1085]:
                      - text: 🚀
                      - strong [ref=e1086]: Effortless Setup
                      - text: ": Install seamlessly using Docker or Kubernetes (kubectl, kustomize or helm) for a hassle-free experience with support for both"
                      - code [ref=e1087]: :ollama
                      - text: and
                      - code [ref=e1088]: :cuda
                      - text: tagged images.
                  - listitem [ref=e1089]:
                    - paragraph [ref=e1090]:
                      - text: 🤝
                      - strong [ref=e1091]: Ollama/OpenAI API Integration
                      - text: ": Effortlessly integrate OpenAI-compatible APIs for versatile conversations alongside Ollama models. Customize the OpenAI API URL to link with"
                      - strong [ref=e1092]: LMStudio, GroqCloud, Mistral, OpenRouter, and more
                      - text: .
                  - listitem [ref=e1093]:
                    - paragraph [ref=e1094]:
                      - text: 🛡️
                      - strong [ref=e1095]: Granular Permissions and User Groups
                      - text: ": By allowing administrators to create detailed user roles and permissions, we ensure a secure user environment. This granularity not only enhances security but also allows for customized user experiences, fostering a sense of ownership and responsibility amongst users."
                  - listitem [ref=e1096]:
                    - paragraph [ref=e1097]:
                      - text: 📱
                      - strong [ref=e1098]: Responsive Design
                      - text: ": Enjoy a seamless experience across Desktop PC, Laptop, and Mobile devices."
                  - listitem [ref=e1099]:
                    - paragraph [ref=e1100]:
                      - text: 📱
                      - strong [ref=e1101]: Progressive Web App (PWA) for Mobile
                      - text: ": Enjoy a native app-like experience on your mobile device with our PWA, providing offline access on localhost and a seamless user interface."
                  - listitem [ref=e1102]:
                    - paragraph [ref=e1103]:
                      - text: ✒️🔢
                      - strong [ref=e1104]: Full Markdown and LaTeX Support
                      - text: ": Elevate your LLM experience with comprehensive Markdown and LaTeX capabilities for enriched interaction."
                  - listitem [ref=e1105]:
                    - paragraph [ref=e1106]:
                      - text: 🎤📹
                      - strong [ref=e1107]: Hands-Free Voice/Video Call
                      - text: ": Experience seamless communication with integrated hands-free voice and video call features using multiple Speech-to-Text providers (Local Whisper, OpenAI, Deepgram, Azure) and Text-to-Speech engines (Azure, ElevenLabs, OpenAI, Transformers, WebAPI), allowing for dynamic and interactive chat environments."
                  - listitem [ref=e1108]:
                    - paragraph [ref=e1109]:
                      - text: 🛠️
                      - strong [ref=e1110]: Model Builder
                      - text: ": Easily create Ollama models via the Web UI. Create and add custom characters/agents, customize chat elements, and import models effortlessly through"
                      - link "Open WebUI Community" [ref=e1111] [cursor=pointer]:
                        - /url: https://openwebui.com/
                      - text: integration.
                  - listitem [ref=e1112]:
                    - paragraph [ref=e1113]:
                      - text: 🐍
                      - strong [ref=e1114]: Native Python Function Calling Tool
                      - text: ": Enhance your LLMs with built-in code editor support in the tools workspace. Bring Your Own Function (BYOF) by simply adding your pure Python functions, enabling seamless integration with LLMs."
                  - listitem [ref=e1115]:
                    - paragraph [ref=e1116]:
                      - text: 💾
                      - strong [ref=e1117]: Persistent Artifact Storage
                      - text: ": Built-in key-value storage API for artifacts, enabling features like journals, trackers, leaderboards, and collaborative tools with both personal and shared data scopes across sessions."
                  - listitem [ref=e1118]:
                    - paragraph [ref=e1119]:
                      - text: 📚
                      - strong [ref=e1120]: Local RAG Integration
                      - text: ": Dive into the future of chat interactions with groundbreaking Retrieval Augmented Generation (RAG) support using your choice of 9 vector databases and multiple content extraction engines (Tika, Docling, Document Intelligence, Mistral OCR, External loaders). Load documents directly into chat or add files to your document library, effortlessly accessing them using the"
                      - code [ref=e1121]: "#"
                      - text: command before a query.
                  - listitem [ref=e1122]:
                    - paragraph [ref=e1123]:
                      - text: 🔍
                      - strong [ref=e1124]: Web Search for RAG
                      - text: ": Perform web searches using 15+ providers including"
                      - code [ref=e1125]: SearXNG
                      - text: ","
                      - code [ref=e1126]: Google PSE
                      - text: ","
                      - code [ref=e1127]: Brave Search
                      - text: ","
                      - code [ref=e1128]: Kagi
                      - text: ","
                      - code [ref=e1129]: Mojeek
                      - text: ","
                      - code [ref=e1130]: Tavily
                      - text: ","
                      - code [ref=e1131]: Perplexity
                      - text: ","
                      - code [ref=e1132]: serpstack
                      - text: ","
                      - code [ref=e1133]: serper
                      - text: ","
                      - code [ref=e1134]: Serply
                      - text: ","
                      - code [ref=e1135]: DuckDuckGo
                      - text: ","
                      - code [ref=e1136]: SearchApi
                      - text: ","
                      - code [ref=e1137]: SerpApi
                      - text: ","
                      - code [ref=e1138]: Bing
                      - text: ","
                      - code [ref=e1139]: Jina
                      - text: ","
                      - code [ref=e1140]: Exa
                      - text: ","
                      - code [ref=e1141]: Sougou
                      - text: ","
                      - code [ref=e1142]: Azure AI Search
                      - text: ", and"
                      - code [ref=e1143]: Ollama Cloud
                      - text: ", injecting results directly into your chat experience."
                  - listitem [ref=e1144]:
                    - paragraph [ref=e1145]:
                      - text: 🌐
                      - strong [ref=e1146]: Web Browsing Capability
                      - text: ": Seamlessly integrate websites into your chat experience using the"
                      - code [ref=e1147]: "#"
                      - text: command followed by a URL. This feature allows you to incorporate web content directly into your conversations, enhancing the richness and depth of your interactions.
                  - listitem [ref=e1148]:
                    - paragraph [ref=e1149]:
                      - text: 🎨
                      - strong [ref=e1150]: Image Generation & Editing Integration
                      - text: ": Create and edit images using multiple engines including OpenAI's DALL-E, Gemini, ComfyUI (local), and AUTOMATIC1111 (local), with support for both generation and prompt-based editing workflows."
                  - listitem [ref=e1151]:
                    - paragraph [ref=e1152]:
                      - text: ⚙️
                      - strong [ref=e1153]: Many Models Conversations
                      - text: ": Effortlessly engage with various models simultaneously, harnessing their unique strengths for optimal responses. Enhance your experience by leveraging a diverse set of models in parallel."
                  - listitem [ref=e1154]:
                    - paragraph [ref=e1155]:
                      - text: 🔐
                      - strong [ref=e1156]: Role-Based Access Control (RBAC)
                      - text: ": Ensure secure access with restricted permissions; only authorized individuals can access your Ollama, and exclusive model creation/pulling rights are reserved for administrators."
                  - listitem [ref=e1157]:
                    - paragraph [ref=e1158]:
                      - text: 🗄️
                      - strong [ref=e1159]: Flexible Database & Storage Options
                      - text: ": Choose from SQLite (with optional encryption), PostgreSQL, or configure cloud storage backends (S3, Google Cloud Storage, Azure Blob Storage) for scalable deployments."
                  - listitem [ref=e1160]:
                    - paragraph [ref=e1161]:
                      - text: 🔍
                      - strong [ref=e1162]: Advanced Vector Database Support
                      - text: ": Select from 9 vector database options including ChromaDB, PGVector, Qdrant, Milvus, Elasticsearch, OpenSearch, Pinecone, S3Vector, and Oracle 23ai for optimal RAG performance."
                  - listitem [ref=e1163]:
                    - paragraph [ref=e1164]:
                      - text: 🔐
                      - strong [ref=e1165]: Enterprise Authentication
                      - text: ": Full support for LDAP/Active Directory integration, SCIM 2.0 automated provisioning, and SSO via trusted headers alongside OAuth providers. Enterprise-grade user and group provisioning through SCIM 2.0 protocol, enabling seamless integration with identity providers like Okta, Azure AD, and Google Workspace for automated user lifecycle management."
                  - listitem [ref=e1166]:
                    - paragraph [ref=e1167]:
                      - text: ☁️
                      - strong [ref=e1168]: Cloud-Native Integration
                      - text: ": Native support for Google Drive and OneDrive/SharePoint file picking, enabling seamless document import from enterprise cloud storage."
                  - listitem [ref=e1169]:
                    - paragraph [ref=e1170]:
                      - text: 📊
                      - strong [ref=e1171]: Production Observability
                      - text: ": Built-in OpenTelemetry support for traces, metrics, and logs, enabling comprehensive monitoring with your existing observability stack."
                  - listitem [ref=e1172]:
                    - paragraph [ref=e1173]:
                      - text: ⚖️
                      - strong [ref=e1174]: Horizontal Scalability
                      - text: ": Redis-backed session management and WebSocket support for multi-worker and multi-node deployments behind load balancers."
                  - listitem [ref=e1175]:
                    - paragraph [ref=e1176]:
                      - text: 🌐🌍
                      - strong [ref=e1177]: Multilingual Support
                      - text: ": Experience Open WebUI in your preferred language with our internationalization (i18n) support. Join us in expanding our supported languages! We're actively seeking contributors!"
                  - listitem [ref=e1178]:
                    - paragraph [ref=e1179]:
                      - text: 🧩
                      - strong [ref=e1180]: Pipelines, Open WebUI Plugin Support
                      - text: ": Seamlessly integrate custom logic and Python libraries into Open WebUI using"
                      - link "Pipelines Plugin Framework" [ref=e1181] [cursor=pointer]:
                        - /url: https://github.com/open-webui/pipelines
                      - text: . Launch your Pipelines instance, set the OpenAI URL to the Pipelines URL, and explore endless possibilities.
                      - link "Examples" [ref=e1182] [cursor=pointer]:
                        - /url: https://github.com/open-webui/pipelines/tree/main/examples
                      - text: include
                      - strong [ref=e1183]: Function Calling
                      - text: ", User"
                      - strong [ref=e1184]: Rate Limiting
                      - text: to control access,
                      - strong [ref=e1185]: Usage Monitoring
                      - text: with tools like Langfuse,
                      - strong [ref=e1186]: Live Translation with LibreTranslate
                      - text: for multilingual support,
                      - strong [ref=e1187]: Toxic Message Filtering
                      - text: and much more.
                  - listitem [ref=e1188]:
                    - paragraph [ref=e1189]:
                      - text: 🌟
                      - strong [ref=e1190]: Continuous Updates
                      - text: ": We are committed to improving Open WebUI with regular updates, fixes, and new features."
                - paragraph [ref=e1191]:
                  - text: Want to learn more about Open WebUI's features? Check out our
                  - link "Open WebUI documentation" [ref=e1192] [cursor=pointer]:
                    - /url: https://docs.openwebui.com/features
                  - text: for a comprehensive overview!
                - separator [ref=e1193]
                - paragraph [ref=e1194]: We are incredibly grateful for the generous support of our sponsors. Their contributions help us to maintain and improve our project, ensuring we can continue to deliver quality work to our community. Thank you!
                - generic [ref=e1195]:
